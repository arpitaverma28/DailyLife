<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class=" h-screen flex items-center justify-center"
      th:style="'background-image:url('+@{/images/bg2.png} + ');
              background-size:contains;'">
<div class="bg-gray-600/50 p-8 rounded-2xl shadow-lg w-[350px] ">

  <!-- Title -->
  <h2 class="text-[35px] font-medium text-center mb-6">Welcome Back </h2>

  <!-- Form -->
  <form th:action="@{/authenticateUser}" method="post">
    <div th:if="${param.error}">
      <i class="text-red-800 text-md mb-3 pb-3 pl-8">
       sorry! Invalid Username/Password
      </i>
    </div>
    <div th:if="${param.logout}">
      <i class="text-green-800 text-md mb-3 pb-3 pl-8">
        Logout SuccessFully!
      </i>
    </div>
    <!-- Username -->
    <div class="mb-4">
      <label class="block text-gray mb-1">Username</label>
      <input type="text" name="username"
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
             placeholder="Enter your username">
    </div>

    <!-- Password -->
    <div class="mb-4">
      <label class="block text-gray mb-1">Password</label>
      <input type="password" name="password"
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
             placeholder="Enter your password">
    </div>

    <!-- Login Button -->
    <button type="submit"
            class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
      Login
    </button>

  </form>

  <!-- Register Link -->
  <p class="text-center text-sm text-gray mt-4">
    Don't have an account?
    <a th:href="@{/register}" class="text-blue-600 font-semibold hover:underline">
      Register
    </a>
  </p>

</div>

</body>
</html>
