<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class=" h-screen flex items-center justify-center"
      th:style="'background-image:url('+@{/images/bg2.png} + ');
              background-size:cover;'">

<div class="bg-gray-600/50 p-6 rounded-2xl shadow-lg w-[350px] ">

    <!-- Title -->
    <h2 class="text-[35px] font-medium text-center mb-4">Create Account</h2>

    <!-- Form -->
    <form th:action="@{/register}" method="post">

        <!-- Username -->
        <div class="mb-4">
            <label class="block text-gray mb-1">Username</label>
            <input type="text" name="username"
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="Enter username" required>
        </div>

        <!-- Email -->
        <div class="mb-4">
            <label class="block text-gray mb-1">Email</label>
            <input type="email" name="email"
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="Enter email" required>
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="block text-gray mb-1">Password</label>
            <input type="password" name="password"
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="Enter password" required>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
            <label class="block text-gray mb-1">Confirm Password</label>
            <input type="password" name="confirmPassword"
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="Confirm password" required>
        </div>

        <!-- Register Button -->
        <button type="submit"
                class="w-full bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600 transition">
            Register
        </button>

    </form>

    <!-- Login Link -->
    <p class="text-center text-sm text-gray mt-4">
        Already have an account?
        <a th:href="@{/login}" class="text-blue-600 font-semibold hover:underline">
            Login
        </a>
    </p>

</div>

</body>
</html>
